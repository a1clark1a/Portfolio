    <!-- Structured data: Person + WebSite (schema.org) -->

            "url": "https://acperfecto.vercel.app/",
            "image": "https://acperfecto.vercel.app/og-image.png",
            "sameAs": [
              "https://www.linkedin.com/in/acperfecto/",
              "https://github.com/a1clark1a"
            ],
            "knowsAbout": ["React", "React Native", "TypeScript", "Node.js", "Full Stack Development"]
          },
          {
            "@type": "WebSite",
            "@id": "https://acperfecto.vercel.app/#website",
            "url": "https://acperfecto.vercel.app/",
            "name": "Clark Perfecto | Full Stack Software Engineer",
            "description": "Portfolio of Anthony Clark Perfecto, a full stack software engineer.",
            "inLanguage": "en",
            "author": { "@id": "https://acperfecto.vercel.app/#person" },

          }
        ]

    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <title>Clark Perfecto | Full Stack Software Engineer</title>
    <!-- Set the theme before paint to avoid a flash of the wrong mode -->
    <script>
      (function () {
        try {
          // Saved choice wins; otherwise follow the OS color scheme.
          var t =
            localStorage.getItem("theme") ||
            (window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark");
          document.documentElement.setAttribute("data-theme", t);
          // Point the tab favicon at the matching theme before first paint.
          var fav = document.querySelector('link[rel="icon"][type="image/svg+xml"]');
          if (fav) fav.href = t === "light" ? "/favicon-light.svg" : "/favicon-dark.svg";
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
